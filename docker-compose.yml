services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: tm_user
      POSTGRES_PASSWORD: tm_pass
      POSTGRES_DB: tm_scorekeeper
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tm_user -d tm_scorekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://tm_user:tm_pass@db:5432/tm_scorekeeper
      FRONTEND_URL: http://localhost:5173
      SEED_DATA: "true"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # keep container's node_modules, don't override with host
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  db_data:
